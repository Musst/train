<script>
const form = document.getElementById("searchForm");
const results = document.getElementById("results");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const depart = document.getElementById("depart").value;
    const arrivee = document.getElementById("arrivee").value;
    const date = document.getElementById("date").value;

    results.innerHTML = "<h2>Résultats</h2>";

    // Simulation de trains
    const trains = [
        { heure: "08:00", duree: "1h00", prix: 25 },
        { heure: "10:00", duree: "1h10", prix: 30 },
        { heure: "14:00", duree: "0h55", prix: 35 }
    ];

    trains.forEach(train => {
        const div = document.createElement("div");
        div.classList.add("train");

        div.innerHTML = `
            <p><strong>${depart} → ${arrivee}</strong></p>
            <p>${train.heure} | ${train.duree}</p>
            <p>${train.prix} €</p>
            <button onclick="reserver()">Réserver</button>
        `;

        results.appendChild(div);
    });
});

function reserver() {
    alert("Billet réservé !");
}
</script>
